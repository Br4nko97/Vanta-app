name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      working-directory: ./vanta
      run: chmod +x gradlew
      continue-on-error: true

    - name: Setup Gradle wrapper (Fallback)
      working-directory: ./vanta
      if: hashFiles('vanta/gradlew') == ''
      run: gradle wrapper

    - name: Build Debug APK
      working-directory: ./vanta
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Vanta-App-Debug-APK
        path: vanta/app/build/outputs/apk/debug/app-debug.apk
